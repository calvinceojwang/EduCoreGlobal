  <body>
    <div id="root">
      <div style="font-family: Arial, sans-serif; padding: 24px; line-height: 1.5;">
        <h2 style="margin: 0 0 8px;">Loading EduCore...</h2>
        <p style="margin: 0;">If this screen stays here, run this project with Vite (not Live Server).</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function () {
        var root = document.getElementById("root");
        if (!root) return;
        var text = (root.textContent || "").trim();
        if (text.indexOf("Loading EduCore...") !== -1) {
          root.innerHTML =
            '<div style="font-family: Arial, sans-serif; padding: 24px; line-height: 1.6;">' +
            "<h2 style='margin:0 0 8px;'>App Not Started</h2>" +
            "<p style='margin:0 0 8px;'>This project uses Vite + React + TypeScript and will show blank on Live Server.</p>" +
            "<p style='margin:0;'>Install Node.js, then run: <code>npm install</code> and <code>npm run dev</code>.</p>" +
            "</div>";
        }
      }, 2500);
    </script>
  </body>
</html>
